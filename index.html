<!-- Indica que el documento usa HTML5 -->
<!DOCTYPE html>

<!-- Inicio del documento HTML y define que el idioma es español -->
<html lang="es">

<head>

  <!-- Permite usar caracteres especiales como ñ, á, é -->
  <meta charset="UTF-8">

  <!-- Hace que la página sea responsive en celulares y tablets -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título que aparece en la pestaña del navegador -->
  <title>Inicio Facebook</title>

  <!-- Importa Bootstrap desde internet -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<!-- Inicio del contenido visible de la página -->
<!-- bg-white coloca fondo blanco -->
<body class="bg-white">

  <!-- Contenedor principal -->
  <!-- container-fluid ocupa todo el ancho -->
  <!-- min-vh-100 hace que ocupe toda la altura de la pantalla -->
  <main class="container-fluid min-vh-100">

    <!-- Fila principal -->
    <!-- row crea una fila del sistema Grid -->
    <!-- min-vh-100 altura completa -->
    <div class="row min-vh-100">

      <!-- ========================= -->
      <!-- LADO IZQUIERDO -->
      <!-- ========================= -->

      <!-- col-12 = ancho completo en celular -->
      <!-- col-lg-7 = ocupa 7 columnas en pantallas grandes -->
      <!-- d-flex activa Flexbox -->
      <!-- flex-column acomoda elementos verticalmente -->
      <!-- justify-content-center centra verticalmente -->
      <!-- px-5 agrega padding horizontal -->
      <!-- border-end agrega línea divisora derecha -->
      <section class="col-12 col-lg-7 d-flex flex-column justify-content-center px-5 border-end">

        <!-- Margen inferior grande -->
        <div class="mb-5">

          <!-- Logo circular -->
          <!-- bg-primary = fondo azul -->
          <!-- text-white = texto blanco -->
          <!-- rounded-circle = forma circular -->
          <!-- d-flex activa flexbox -->
          <!-- align-items-center centra vertical -->
          <!-- justify-content-center centra horizontal -->
          <!-- fs-1 tamaño grande -->
          <!-- fw-bold texto en negrita -->
          <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fs-1 fw-bold"
               style="width:70px; height:70px;">

            <!-- Letra simulando logo -->
            f

          </div>
        </div>

        <!-- Nueva fila interna -->
        <!-- align-items-center centra verticalmente -->
        <div class="row align-items-center">

          <!-- Texto izquierdo -->
          <!-- col-12 ancho completo en celular -->
          <!-- col-md-5 ocupa 5 columnas en tablets y PC -->
          <div class="col-12 col-md-5">

            <!-- display-3 texto enorme -->
            <!-- fw-bold negrita -->
            <!-- lh-1 reduce espacio entre líneas -->
            <h1 class="display-3 fw-bold lh-1">

              Explora <br>
              lo que <br>

              <!-- text-primary coloca color azul -->
              <span class="text-primary">
                más te <br> gusta.
              </span>

            </h1>
          </div>

          <!-- Contenedor de imágenes -->
          <!-- col-md-7 ocupa 7 columnas -->
          <!-- text-center centra -->
          <!-- mt-4 margen arriba -->
          <!-- mt-md-0 elimina margen en pantallas medianas -->
          <div class="col-12 col-md-7 text-center mt-4 mt-md-0">

            <!-- position-relative sirve como referencia para elementos absolutos -->
            <!-- d-inline-block ajusta el tamaño al contenido -->
            <div class="position-relative d-inline-block">

              <!-- Imagen principal -->
              <!-- rounded-4 bordes redondeados -->
              <!-- shadow agrega sombra -->
              <!-- img-fluid hace la imagen responsive -->
              <img src="https://picsum.photos/320/450"
                   class="rounded-4 shadow img-fluid"
                   alt="Imagen principal">

              <!-- Badge flotante -->
              <!-- position-absolute permite mover libremente -->
              <!-- top-0 arriba -->
              <!-- end-0 derecha -->
              <!-- translate-middle ajusta posición -->
              <!-- badge estilo Bootstrap -->
              <!-- rounded-pill forma ovalada -->
              <!-- bg-primary fondo azul -->
              <!-- fs-6 tamaño texto -->
              <!-- p-3 padding -->
              <span class="position-absolute top-0 end-0 translate-middle badge rounded-pill bg-primary fs-6 p-3">

                🕘 16:45

              </span>

              <!-- Tarjeta blanca flotante -->
              <!-- bottom-0 abajo -->
              <!-- start-0 izquierda -->
              <!-- translate-middle-y centra vertical -->
              <!-- bg-white fondo blanco -->
              <!-- rounded-4 bordes redondeados -->
              <!-- shadow sombra -->
              <!-- p-3 padding -->
              <div class="position-absolute bottom-0 start-0 translate-middle-y bg-white rounded-4 shadow p-3"
                   style="width:220px;">

                <!-- Imagen interna -->
                <img src="https://picsum.photos/200/130"
                     class="img-fluid rounded-3 mb-2"
                     alt="Publicación">

                <!-- placeholder-glow crea efecto animado -->
                <div class="placeholder-glow">

                  <!-- Línea gris simulando texto -->
                  <span class="placeholder col-10"></span>

                  <!-- Segunda línea gris -->
                  <span class="placeholder col-7"></span>

                </div>
              </div>

              <!-- Botón flotante corazón -->
              <!-- bg-danger color rojo -->
              <!-- text-white color blanco -->
              <!-- rounded-circle círculo -->
              <!-- d-flex flexbox -->
              <!-- align-items-center centra vertical -->
              <!-- justify-content-center centra horizontal -->
              <!-- fs-1 tamaño grande -->
              <!-- shadow agrega sombra -->
              <div class="position-absolute bottom-0 end-0 translate-middle-y bg-danger text-white rounded-circle d-flex align-items-center justify-content-center fs-1 shadow"
                   style="width:80px; height:80px;">

                ♥
              </div>

            </div>
          </div>

        </div>
      </section>

      <!-- ========================= -->
      <!-- LADO DERECHO -->
      <!-- ========================= -->

      <!-- col-12 ancho completo móvil -->
      <!-- col-lg-5 ocupa 5 columnas en PC -->
      <!-- d-flex activa flexbox -->
      <!-- align-items-center centra vertical -->
      <!-- justify-content-center centra horizontal -->
      <!-- p-5 agrega padding -->
      <section class="col-12 col-lg-5 d-flex align-items-center justify-content-center p-5">

        <!-- Contenedor del formulario -->
        <!-- w-100 ocupa todo el ancho -->
        <div class="w-100" style="max-width: 420px;">

          <!-- Título -->
          <!-- fw-bold negrita -->
          <!-- mb-4 margen inferior -->
          <h5 class="fw-bold mb-4">
            Iniciar sesión en Facebook
          </h5>

          <!-- Inicio formulario -->
          <form>

            <!-- Margen inferior -->
            <div class="mb-3">

              <!-- Campo correo -->
              <!-- form-control estilo Bootstrap -->
              <!-- form-control-lg tamaño grande -->
              <!-- rounded-4 bordes redondeados -->
              <input type="text"
                     class="form-control form-control-lg rounded-4"
                     placeholder="Correo electrónico o número de celular">

            </div>

            <!-- Margen inferior -->
            <div class="mb-4">

              <!-- Campo contraseña -->
              <input type="password"
                     class="form-control form-control-lg rounded-4"
                     placeholder="Contraseña">

            </div>

            <!-- Botón iniciar sesión -->
            <!-- btn estilo botón -->
            <!-- btn-primary color azul -->
            <!-- btn-lg tamaño grande -->
            <!-- w-100 ancho completo -->
            <!-- rounded-pill forma ovalada -->
            <!-- fw-semibold seminegrita -->
            <button type="submit"
                    class="btn btn-primary btn-lg w-100 rounded-pill fw-semibold">

              Iniciar sesión

            </button>

            <!-- Contenedor enlace -->
            <div class="text-center mt-4">

              <!-- text-decoration-none elimina subrayado -->
              <!-- text-dark color negro -->
              <!-- fw-semibold seminegrita -->
              <a href="#"
                 class="text-decoration-none text-dark fw-semibold">

                ¿Olvidaste tu contraseña?

              </a>
            </div>

            <!-- Margen superior -->
            <div class="mt-5">

              <!-- Botón borde azul -->
              <!-- btn-outline-primary crea botón transparente -->
              <button type="button"
                      class="btn btn-outline-primary w-100 rounded-pill fw-semibold">

                Crear cuenta nueva

              </button>

            </div>

            <!-- Texto Meta -->
            <div class="text-center mt-4 text-primary fw-bold">

              ∞ Meta

            </div>

          </form>

        </div>

      </section>

    </div>
  </main>

  <!-- Importa JavaScript de Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
